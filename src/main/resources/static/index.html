cat > src/main/resources/static/index.html <<EOF
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BookMyShow Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .movie-card { margin: 20px 0; }
        .movie-card img { width: 100%; border-radius: 8px; }
        .movie-title { font-weight: bold; margin-top: 10px; }
        .book-btn { margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1 class="text-center my-4">BookMyShow Demo</h1>
    <div class="row" id="movies-container">
        <div class="col-md-4 movie-card">
            <img src="https://via.placeholder.com/300x400.png?text=Movie+1" alt="Movie 1">
            <div class="movie-title">Movie 1</div>
            <button class="btn btn-primary book-btn">Book Now</button>
        </div>
        <div class="col-md-4 movie-card">
            <img src="https://via.placeholder.com/300x400.png?text=Movie+2" alt="Movie 2">
            <div class="movie-title">Movie 2</div>
            <button class="btn btn-primary book-btn">Book Now</button>
        </div>
        <div class="col-md-4 movie-card">
            <img src="https://via.placeholder.com/300x400.png?text=Movie+3" alt="Movie 3">
            <div class="movie-title">Movie 3</div>
            <button class="btn btn-primary book-btn">Book Now</button>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const buttons = document.querySelectorAll('.book-btn');
buttons.forEach(btn => btn.addEventListener('click', () => alert('Booking feature coming soon!')));
</script>
</body>
</html>
EOF
